x-common: &common
  restart: unless-stopped
  environment: &env
    TZ: ${TZ:-America/Los_Angeles}

x-health: &health
  interval: 5m
  timeout: 10s
  retries: 5
  start_period: 1m

# =================================================================
name: weather-channel
services:
  # ================================
  # weatherstar-4000
  # ================================
  ws4kp-fork:
    image: ghcr.io/netbymatt/ws4kp:latest
    container_name: ws4kp-fork
    <<: *common
    environment:
      <<: *env
      # Each argument in the permalink URL can become an environment variable on the Docker host by adding WSQS_
      # Following the "Sharing a Permalink" example below, here are a few environment variables defined. Visit that section for a
      # more complete list of configuration options.
      # ====
      WSQS_hazards-checkbox: "${WSQS_hazards_checkbox:-true}"
      WSQS_current-weather-checkbox: "${WSQS_current_weather_checkbox:-true}"
      WSQS_latest-observations-checkbox: "${WSQS_latest_observations_checkbox:-true}"
      WSQS_hourly-checkbox: "${WSQS_hourly_checkbox:-true}"
      WSQS_hourly-graph-checkbox: "${WSQS_hourly_graph_checkbox:-true}"
      WSQS_travel-checkbox: "${WSQS_travel_checkbox:-true}"
      WSQS_regional-forecast-checkbox: "${WSQS_regional_forecast_checkbox:-true}"
      WSQS_local-forecast-checkbox: "${WSQS_local_forecast_checkbox:-true}"
      WSQS_extended-forecast-checkbox: "${WSQS_extended_forecast_checkbox:-true}"
      WSQS_almanac-checkbox: "${WSQS_almanac_checkbox:-true}"
      WSQS_spc-outlook-checkbox: "${WSQS_spc_outlook_checkbox:-true}"
      WSQS_radar-checkbox: "${WSQS_radar_checkbox:-true}"
      WSQS_settings-wide-checkbox: "${WSQS_settings_wide_checkbox:-true}"
      WSQS_settings-kiosk-checkbox: "${WSQS_settings_kiosk_checkbox:-false}"
      WSQS_settings-stickyKiosk-checkbox: "${WSQS_settings_stickyKiosk_checkbox:-false}"
      WSQS_settings-customTextEnable-checkbox: "${WSQS_settings_customTextEnable_checkbox:-false}"
      WSQS_settings-speed-select: "${WSQS_settings_speed_select:-1.00}"
      WSQS_settings-scanLineMode-select: "${WSQS_settings_scanLineMode_select:-auto}"
      WSQS_settings-units-select: "${WSQS_settings_units_select:-us}"
      WSQS_settings-customText-string: "${WSQS_settings_customText_string:-}"
      WSQS_share-link-url: "${WSQS_share_link_url:-}"
      WSQS_settings-scanLines-checkbox: "${WSQS_settings_scanLines_checkbox:-false}"
      WSQS_settings-mediaVolume-select: "${WSQS_settings_mediaVolume_select:-0.75}"
      WSQS_txtLocation: "${WSQS_txtLocation:-}"
      WSQS_latLonQuery: "${WSQS_latLonQuery:-}"
      WSQS_latLon: "${WSQS_latLon:-}"
    # ================================
    ports:
      - ${PORT:-8080}:8080 # change the first 8080 to meet your local network needs
    # ================================
    healthcheck:
      test: curl -f http://localhost:8080 || exit 1
      <<: *health

  # ================================
  # ws4k -> channels dvr
  #   - https://github.com/rice9797/ws4channels
  #   - */playlist.m3u
  #   - */guide.xml
  # ================================
  ws4channels-fork:
    build: .
    container_name: ws4channels-fork
    <<: *common
    depends_on:
      ws4kp-fork:
        condition: service_healthy
    devices:
      - /dev/dri:/dev/dri
    cap_add:
      - SYS_PTRACE
    environment:
      <<: *env
      WS4KP_HOST: ws4kp-fork
      WS4KP_PORT: ${WS4KP_PORT:-8080}
      FRAME_RATE: ${FRAME_RATE:-10}
      DEBUG_SLEEP: ${DEBUG_SLEEP:-0}
      # Software encoding (default, works everywhere)
      # VIDEO_OPTIONS: default
      # Intel Quick Sync
      # VIDEO_OPTIONS: qsv
      # VA-API hardware encoding
      VIDEO_OPTIONS: ${VIDEO_OPTIONS:-vaapi}
      # Custom string (passed through as-is)
      # VIDEO_OPTIONS: "-c:v libx264 -preset medium -b:v 1000k"
      # ── Channel & EPG metadata ──
      CHANNEL_ID: "${CHANNEL_ID:-weatherStar4000}"
      CHANNEL_NAME: "${CHANNEL_NAME:-WeatherStar 4000}"
      CHANNEL_NUMBER: "${CHANNEL_NUMBER:-900}"
      CHANNEL_LOGO: "${CHANNEL_LOGO:-ws4000.png}"
      PROGRAM_TITLE: "${PROGRAM_TITLE:-Local Weather}"
      PROGRAM_DESC: "${PROGRAM_DESC:-Enjoy your local weather with a touch of nostalgia.}"
      PROGRAM_LOGO: "${PROGRAM_LOGO:-ws4000.png}"
      # ── Logging ──
      LOG_LEVEL: "${LOG_LEVEL:-info}"
    # ================================
    ports:
      - ${STREAM_PORT:-9798}:9798
    # ================================
    healthcheck:
      test: curl -f http://localhost:9798/guide.xml || exit 1
      <<: *health