x-common: &common
  restart: unless-stopped
  environment: &env
    TZ: America/Los_Angeles
  networks:
    - proxy_net

x-health: &health
  interval: 5m
  timeout: 10s
  retries: 5
  start_period: 1m

# =================================================================
networks:
  proxy_net:
    external: true
    name: proxy_net

# =================================================================
name: weather-channels-fork
services:
  # ================================
  # weatherstar-4000
  # ================================
  ws4kp-fork:
    image: ghcr.io/netbymatt/ws4kp:latest
    container_name: ws4kp-fork
    <<: *common
    environment:
      <<: *env
      # Each argument in the permalink URL can become an environment variable on the Docker host by adding WSQS_
      # Following the "Sharing a Permalink" example below, here are a few environment variables defined. Visit that section for a
      # more complete list of configuration options.
      # ====
      # WSQS_latLonQuery: Orlando International Airport Orlando FL USA
      # WSQS_hazards_checkbox: true
      # WSQS_current_weather_checkbox: true
      # WSQS_kiosk: true
      # ====
      WSQS_hazards-checkbox: true
      WSQS_current-weather-checkbox: true
      WSQS_latest-observations-checkbox: true
      WSQS_hourly-checkbox: true
      WSQS_hourly-graph-checkbox: true
      WSQS_travel-checkbox: true
      WSQS_regional-forecast-checkbox: true
      WSQS_local-forecast-checkbox: true
      WSQS_extended-forecast-checkbox: true
      WSQS_almanac-checkbox: true
      WSQS_spc-outlook-checkbox: true
      WSQS_radar-checkbox: true
      WSQS_settings-wide-checkbox: true
      # WSQS_settings-kiosk-checkbox: false
      WSQS_settings-kiosk-checkbox: true
      # WSQS_settings-stickyKiosk-checkbox: false
      # WSQS_settings-customTextEnable-checkbox: false
      WSQS_settings-speed-select: 1.00
      # WSQS_settings-scanLineMode-select: auto
      WSQS_settings-units-select: us
      # WSQS_settings-customText-string:
      # WSQS_share-link-url:
      # WSQS_settings-scanLines-checkbox: false
      # WSQS_settings-mediaVolume-select: 0.75
      # WSQS_txtLocation:
      # WSQS_latLonQuery:
      # WSQS_latLon:
    # ================================
    ports:
      - ${PORT:-8080}:8080 # change the first 8080 to meet your local network needs
    # ================================
    healthcheck:
      test: curl -f http://localhost:8080 || exit 1
      <<: *health
    # ================================
    labels:
      # TRAEFIK
      - traefik.enable=true
      # Use the right network and port
      - traefik.docker.network=proxy_net
      - traefik.http.services.weather.loadbalancer.server.port=8080
      # HTTPS by default
      - traefik.http.routers.weather.rule=Host(`weather.lan.goober.house`)
      - traefik.http.routers.weather.entrypoints=websecure
      - traefik.http.routers.weather.tls=true
      - traefik.http.routers.weather.tls.certresolver=cloudflare
      # HTTP redirect to HTTPS
      - traefik.http.routers.weather-http.entrypoints=web
      - traefik.http.routers.weather-http.rule=Host(`weather.lan.goober.house`)
      - traefik.http.routers.weather-http.middlewares=redir-https
      # - traefik.http.middlewares.redir-https.redirectscheme.scheme=https

  # ================================
  # ws4k -> channels dvr
  #   - https://github.com/rice9797/ws4channels
  #   - */playlist.m3u
  #   - */guide.xml
  # ================================
  ws4channels-fork:
    build: .
    container_name: ws4channels-fork
    <<: *common
    depends_on:
      ws4kp-fork:
        condition: service_healthy
    devices:
      - /dev/dri:/dev/dri
    cap_add:
      - SYS_PTRACE
    # deploy:
    #   resources:
    #     limits:
    #       memory: 1096m
    #       cpus: 1
    environment:
      <<: *env
      WS4KP_HOST: ws4kp-fork
      WS4KP_PORT: 8080
      FRAME_RATE: 5
      # Software encoding (default, works everywhere)
      # VIDEO_OPTIONS: default
      # Intel Quick Sync
      # VIDEO_OPTIONS: qsv
      # VA-API hardware encoding
      VIDEO_OPTIONS: vaapi
      # Custom string (passed through as-is)
      # VIDEO_OPTIONS: "-c:v libx264 -preset medium -b:v 1000k"
      # ── Channel & EPG metadata ──
      # CHANNEL_ID: weatherStar4000
      # CHANNEL_NAME: WeatherStar 4000
      # CHANNEL_NUMBER: 275
      # CHANNEL_LOGO: ws4000.png
      # PROGRAM_TITLE: Local Weather
      # PROGRAM_DESC: "Enjoy your local weather with a touch of nostalgia."
      # PROGRAM_LOGO: ws4000.png
    # ================================
    ports:
      - ${STREAM_PORT:-9798}:9798
    # ================================
    healthcheck:
      test: curl -f http://localhost:9798/guide.xml || exit 1
      <<: *health
    # ================================
    labels:
      # TRAEFIK
      - traefik.enable=true
      # Use the right network and port
      - traefik.docker.network=proxy_net
      - traefik.http.services.weatherchannel.loadbalancer.server.port=9798
      # HTTPS by default
      - traefik.http.routers.weatherchannel.rule=Host(`weather-channel.lan.goober.house`)
      - traefik.http.routers.weatherchannel.entrypoints=websecure
      - traefik.http.routers.weatherchannel.tls=true
      - traefik.http.routers.weatherchannel.tls.certresolver=cloudflare
      - traefik.http.routers.weatherchannel.service=weatherchannel
      # HTTP redirect to HTTPS
      - traefik.http.routers.weatherchannel-http.entrypoints=web
      - traefik.http.routers.weatherchannel-http.rule=Host(`weather-channel.lan.goober.house`)
      - traefik.http.routers.weatherchannel-http.middlewares=redir-https
      - traefik.http.routers.weatherchannel-http.service=weatherchannel
      # - traefik.http.middlewares.redir-https.redirectscheme.scheme=https